<!DOCTYPE html>
<html>
<head>
  <title>Experiment 6 - Frames with Styles</title>

  <!-- External stylesheet -->
  <link rel="stylesheet" type="text/css" href="style.css">

  <!-- Internal stylesheet -->
  <style>
    .frame3 {
      background-color: #c2f0c2;
      padding: 20px;
      font-weight: bold;
    }

    .frame4 {
      background-color: #ffe0b3;
      padding: 20px;
      border: 2px dashed #333;
    }

    .frame6 {
      background-color: #e0ccff;
      padding: 20px;
      font-style: italic;
    }
  </style>
</head>
<body>

  <h2>Web Page with 6 Styled Frames</h2>

  <div class="frame-container">
    <div class="frame frame1">Frame 1 (External CSS)</div>
    <div class="frame frame2">Frame 2 (External CSS)</div>
    <div class="frame frame3">Frame 3 (Internal CSS)</div>
    <div class="frame frame4">Frame 4 (Internal CSS)</div>
    <div class="frame frame5">Frame 5 (External CSS)</div>
    <div class="frame frame6">Frame 6 (Internal CSS)</div>
  </div>

</body>
</html>
