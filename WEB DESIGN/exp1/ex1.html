<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXP1</title>
    <style>
        body, html, #Particles {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #Particles canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        label, input {
            margin: 5px 0;
        }

        button {
            margin-top: 10px;
        }

        .logo {
            position: relative;
            top: 0%;
            left: 0%;
            z-index: 1;
            height: auto;
            width: 10%;
        }
    </style>
</head>
<body>
    <a href = "ass1\index.html">
    <img src="logo.png" class="logo">
    </a>
    
    <div id="Particles">
        <canvas></canvas>
    </div>

    <div class="form-container">
        <h2>Form</h2>
        <form action="#" method="post">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            
            <label>Choose an option:</label>
            <input type="radio" id="option1" name="options" value="option1" required>
            <label for="option1">Option 1</label>
            
            <input type="radio" id="option2" name="options" value="option2">
            <label for="option2">Option 2</label>
            
            <input type="checkbox" id="choose1" name="choose" value="choose1" required>
            <label for="chosse1">choose 1</label>

            <input type="checkbox" id="choose2" name="choose" value="choose2" required>
            <label for="chosse2">choose 2</label>

            <!--<button type="reset">Reset</button>
            -->
            <button type="submit">Submit</button>
        </form>
    </div>

    <script type="module">
        import { particlesCursor } from 'https://unpkg.com/threejs-toys@0.0.8/build/threejs-toys.module.cdn.min.js';
   
        const pc = particlesCursor({
            el: document.getElementById('Particles'),
            gpgpuSize: 512,
            colors: [0x00fffc, 0x0000ff],
            color: 0xff0000,
            coordScale: 0.5,
            noiseIntensity: 0.005,
            noiseTimeCoef: 0.0001,
            pointSize: 2,
            pointDecay: 0.0025,
            sleepRadiusX: 250,
            sleepRadiusY: 250,
            sleepTimeCoefX: 0.001,
            sleepTimeCoefY: 0.002
        });
    </script>
</body>
</html>
